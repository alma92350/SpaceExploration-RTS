<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stellar Frontier: RTS</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header id="topbar">
      <span class="title">STELLAR FRONTIER: RTS</span>
      <div id="resources" class="resources"></div>
      <div id="matchClock" class="clock">0:00</div>
      <button id="idleWorkers" class="idle-workers hidden" title="Idle workers — click to select the next one (`)"></button>
      <span id="factionChip" class="faction-chip hidden" title="Your faction vs the opponent's — each side's passive trait bonus."></span>
      <span id="seedChip" class="seed-chip hidden" title="Match seed — click to copy. Enter it on the setup screen to replay this map."></span>
      <input id="volume" class="volume" type="range" min="0" max="100" value="90" title="Sound volume" aria-label="Sound volume">
      <button id="muteBtn" class="mute-btn" title="Mute sound" aria-pressed="false">🔊</button>
      <button id="saveBtn" class="chip-btn" title="Save game">Save</button>
      <button id="loadBtn" class="chip-btn" title="Load saved game">Load</button>
      <button id="helpBtn" class="help-btn" title="Controls &amp; help (F1)" aria-label="Help">?</button>
    </header>
    <main id="main">
      <div id="view">
        <canvas id="field"></canvas>
        <div id="underAttackAlert" class="under-attack hidden" title="Click to jump to the attack">⚠ Under Attack ▸</div>
        <div id="galaxyToast" class="galaxy-toast hidden"></div>
        <div id="objectives" class="objectives hidden"></div>
        <div id="scenarioBar" class="scenario-bar hidden">
          <span id="scenarioBanner" class="scenario-banner"></span>
          <span id="scenarioStatus" class="scenario-status"></span>
          <button id="repairBtn" class="scenario-btn hidden"></button>
          <button id="departBtn" class="scenario-btn hidden">Depart ▸</button>
        </div>
        <canvas id="minimap" class="minimap"></canvas>
        <button id="sheetToggle" class="sheet-toggle" title="Show or hide the panel" aria-label="Show or hide the panel">▾</button>
        <div id="gameOver" class="overlay hidden"></div>
      </div>
      <aside id="selectionPanel" class="panel"></aside>
    </main>
  </div>

  <div id="helpOverlay" class="overlay help-overlay hidden"></div>
  <div id="mapSelect" class="map-select"></div>

  <script type="module" src="main.js"></script>
</body>
</html>
